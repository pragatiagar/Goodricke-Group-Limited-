function getUrgency(due) {
  if (!due) return null;
  const today = new Date(); today.setHours(0, 0, 0, 0);
  const dueDay = new Date(due + 'T00:00:00'); dueDay.setHours(0, 0, 0, 0);
  const diff = Math.round((dueDay - today) / 86400000);
  if (diff < 0)  return 'overdue';
  if (diff <= 3) return 'urgent';
  if (diff <= 7) return 'soon';
  return null;
}

/* ═══════════════════════════════════════
   PROGRESS COMPUTATION
═══════════════════════════════════════ */
function computeProgress(phases, presentations) {
  const vp     = phases.filter(p => PHASE_WEIGHTS[p.name]);
  const rawW   = vp.map(p => PHASE_WEIGHTS[p.name]);
  const totalW = rawW.reduce((s,w)=>s+w, 0);
  const normW  = rawW.map(w => w/totalW);
  let completedW=0, currentW=0, currentPct=0, foundCurrent=false;
  vp.forEach((phase, i) => {
    if (foundCurrent) return;
    if (COMPLETE_STATUSES.has(phase.status)) { completedW += normW[i]; return; }
    foundCurrent = true;
    currentW = normW[i];
    const ps = pd(phase.start), pe = new Date(pd(phase.end).getTime() + 86400000);
    const phaseEvts = presentations.filter(e => { const d=pd(e.date); return d>=ps&&d<=pe; });
    const done = phaseEvts.filter(e=>e.status==='Done'||e.status==='Received').length;
    currentPct = phaseEvts.length > 0 ? done/phaseEvts.length : 0;
  });
  return Math.round((completedW + currentW*currentPct)*100);
}

function getCurrentPhase(phases) {
  return phases.find(p => ACTIVE_STATUSES.has(p.status))
      || phases.find(p => p.status === 'Yet to begin')
      || phases[phases.length - 1];
}

function getNextMilestone(presentations) {
  const today = new Date(); today.setHours(0,0,0,0);
  return [...presentations]
    .filter(e => (e.status === 'Scheduled' || e.status === 'Pending') && pd(e.date) >= today)
    .sort((a,b) => pd(a.date)-pd(b.date))[0] || null;
}

      style={{ fontFamily:T.sans, fontSize:8, fontWeight:700, letterSpacing:'0.1em', textTransform:'uppercase', color:T.accent }}>
      ✏ {label}
    </button>
  );
}

/* ═══════════════════════════════════════
   EDITABLE TEXT (inline)
═══════════════════════════════════════ */
function EditableText({ value, onChange, style, placeholder, editMode, multiline, as:Tag='span' }) {
  const T = useContext(ThemeCtx);
  const [editing, setEditing] = useState(false);
  const [draft, setDraft]     = useState(value);
  const ref = useRef();

  useEffect(() => { setDraft(value); }, [value]);
  useEffect(() => { if (editing && ref.current) ref.current.focus(); }, [editing]);

  const save = () => { if (draft !== value) onChange(draft); setEditing(false); };
  const cancel = () => { setDraft(value); setEditing(false); };

  if (editing) {
    if (multiline) return (
      <textarea ref={ref} value={draft} onChange={e=>setDraft(e.target.value)}
        onBlur={save} onKeyDown={e=>{ if(e.key==='Escape') cancel(); }}
        style={{ ...style, border:'1.5px solid '+T.accent, borderRadius:4, padding:'4px 8px', background:T.accentBg, outline:'none', width:'100%', resize:'vertical', minHeight:60, lineHeight:1.65 }} />
    );
    return (
      <input ref={ref} type="text" value={draft} onChange={e=>setDraft(e.target.value)}
        onBlur={save} onKeyDown={e=>{ if(e.key==='Enter') save(); if(e.key==='Escape') cancel(); }}
        style={{ ...style, border:'1.5px solid '+T.accent, borderRadius:4, padding:'2px 8px', background:T.accentBg, outline:'none' }} />
    );
  }

  if (!editMode) return <Tag style={style}>{value || ''}</Tag>;

  return (
    <Tag style={{ ...style, borderBottom:`1px dashed ${T.accent}60`, cursor:'text', display:'inline' }}
      onClick={() => { setDraft(value); setEditing(true); }} title="Click to edit">
      {value || <span style={{ color:T.text3, fontStyle:'italic', fontWeight:400 }}>{placeholder || 'Click to edit'}</span>}
    </Tag>
  );
}

function EditModal({ modal, onClose, onSave, onDelete, phases, deliverables, meetings, presentations, deps, onShiftDates, team }) {
  const T = useContext(ThemeCtx);
  const [draft, setDraft] = useState({ ...modal.item });
  const [shiftLinked, setShiftLinked] = useState(true);
  const up = (k, v) => setDraft(p => ({ ...p, [k]: v }));

  const inputStyle = { background:T.surface, border:`1px solid ${T.border}`, color:T.text1 };
  const typeLabels = { phase:'Phase', team:'Team Member', meeting:'Meeting', deliverable:'Deliverable', dep:'Input Required', activity:'Update', link:'Link', calband:'Calendar Band' };
  const label = typeLabels[modal.type] || modal.type;

  /* ── Linked-date shift (phase end date changed) ── */
  const phaseDiff = (modal.type === 'phase' && !modal.isNew && modal.item.end && draft.end)
    ? Math.round((pd(draft.end) - pd(modal.item.end)) / 86400000)
    : 0;
  const phaseLinkedCount = (() => {
    if (modal.type !== 'phase' || modal.isNew || phaseDiff === 0) return 0;
    const ps = pd(modal.item.start), pe = new Date(pd(modal.item.end).getTime() + 86400000);
    const linkedDelivs = deliverables.filter(d => d.phase === modal.item.name).length;
    const linkedMtgs   = meetings.filter(m => meetingPhaseId(m) === modal.item.id).length;
    const linkedPres   = presentations.filter(p => { const dt = pd(p.date); return dt >= ps && dt <= pe; }).length;
    const linkedDeps   = deps.filter(d => { if (!d.due) return false; const dt = pd(d.due); return dt >= ps && dt <= pe; }).length;
    return linkedDelivs + linkedMtgs + linkedPres + linkedDeps;
  })();
  const handleSave = () => {
    if (modal.type === 'phase' && phaseDiff !== 0 && phaseLinkedCount > 0 && shiftLinked) {
      onShiftDates(modal.item, phaseDiff);
    }
    onSave(draft);
  };

  function renderForm() {
    switch (modal.type) {

      case 'phase': return (
        <>
          <FormRow>

          <FormField label="Status">
            <select className="form-select" style={inputStyle} value={draft.status||''} onChange={e=>up('status',e.target.value)}>

          <FormRow>
            <FormField label="Start Date" half><input className="form-input" style={inputStyle} type="date" value={draft.start||''} onChange={e=>up('start',e.target.value)} /></FormField>
            <FormField label="End Date" half><input className="form-input" style={inputStyle} type="date" value={draft.end||''} onChange={e=>up('end',e.target.value)} /></FormField>
          </FormRow>
          {phaseDiff !== 0 && phaseLinkedCount > 0 && (
            <div style={{ marginTop:-4, marginBottom:16, padding:'10px 12px', background:T.accentBg, borderRadius:6, border:`1px solid ${T.accent}30` }}>
              <label style={{ display:'flex', alignItems:'flex-start', gap:8, cursor:'pointer' }}>
                <input type="checkbox" checked={shiftLinked} onChange={e=>setShiftLinked(e.target.checked)} style={{ marginTop:2 }} />
                <span style={{ fontFamily:T.sans, fontSize:10, color:T.text2, lineHeight:1.5 }}>
                  End date moved by {phaseDiff > 0 ? '+' : ''}{phaseDiff} day{Math.abs(phaseDiff)===1?'':'s'} — also shift {phaseLinkedCount} linked date{phaseLinkedCount===1?'':'s'} (deliverables, meetings, milestones, and client items due in this phase) by the same amount.
                </span>
              </label>
            </div>
          )}
          <FormField label="Description">
            <textarea className="form-textarea" style={inputStyle} value={draft.description||''} onChange={e=>up('description',e.target.value)} placeholder="What happens in this phase..." />
          </FormField>

      <div style={{ background:T.surface, borderRadius:10, maxWidth:560, width:'calc(100% - 48px)', maxHeight:'90vh', overflow:'auto', padding:'32px 36px', boxShadow:'0 24px 64px rgba(0,0,0,0.28)', border:`1px solid ${T.border}` }}
        onClick={e=>e.stopPropagation()}>

            <button onClick={onClose}
              style={{ background:T.bg, border:`1px solid ${T.border}`, borderRadius:6, padding:'8px 18px', color:T.text2, fontSize:11, fontWeight:600, cursor:'pointer' }}>

          </div>
        </div>
      </div>
    </div>
  );
}

   MEETING VIEW MODAL
═══════════════════════════════════════ */
function parseMeetingForView(m) {
  const decisions = (m.decisions||'').split('\n').filter(Boolean);
  const teamItems = (m.teamItems||'').split('\n').filter(Boolean).map(line => {
    const done = line.includes('[done]');
    const clean = line.replace('[done]','').trim();
    const colonIdx = clean.indexOf(':');
    const who  = colonIdx > -1 ? clean.slice(0, colonIdx).trim() : '';
    const task = colonIdx > -1 ? clean.slice(colonIdx+1).trim() : clean;
    return { who, task, done };
  });
  const clientItems = (m.clientItems||'').split('\n').filter(Boolean).map(line => {
    const done = line.includes('[done]');
    const task = line.replace('[done]','').trim();
    return { task, done };
  });
  return { decisions, teamItems, clientItems };
}

  const T = useContext(ThemeCtx);
  if (!meeting) return null;
  const todayV = new Date(); todayV.setHours(0,0,0,0);
  const isPast = meeting.status === 'Done' || pd(meeting.date) < todayV;
  const { decisions, teamItems, clientItems } = parseMeetingForView(meeting);

  return (

          <div>
            <div style={{ fontFamily:T.sans, fontSize:8, fontWeight:700, letterSpacing:'0.2em', textTransform:'uppercase', color:T.text3, marginBottom:6 }}>{meeting.type} · {fmtDate(meeting.date)}</div>
            <div style={{ fontFamily:T.serif, fontSize:20, fontWeight:500, color:T.text1, lineHeight:1.2 }}>{meeting.title}</div>
            {meeting.time && <div style={{ fontFamily:T.sans, fontSize:11, color:T.text3, marginTop:5 }}>{meeting.time}</div>}
          </div>
          <div style={{ display:'flex', gap:8, alignItems:'center', flexShrink:0, marginLeft:16 }}>
            <Pill color={cTextColor(meeting.status)} bg={cBg(meeting.status)}>{meeting.status}</Pill>
            <button onClick={onClose} style={{ background:'none', border:'none', cursor:'pointer', color:T.text3, fontSize:20, padding:'0 2px', lineHeight:1 }}>✕</button>
          </div>
        </div>

        {(meeting.inPerson) && (
          <div style={{ marginBottom:12 }}>
            <div style={{ display:'flex', alignItems:'center', gap:10, padding:'11px 15px', background:'#FAF0E6', borderRadius:7, border:'1px solid #EAD2B0' }}>
              <span style={{ fontSize:15 }}>📍</span>
              <span style={{ fontFamily:T.sans, fontSize:11, fontWeight:600, color:'#8A5A2A' }}>{meeting.location || 'In-person meeting'}</span>
            </div>
          </div>
        )}
        {(meeting.gmeetLink) && (() => {
          const isZoom = meeting.gmeetLink.includes('zoom.us');
          return (
            <div style={{ marginBottom:18 }}>
              <a href={meeting.gmeetLink} target="_blank" rel="noopener noreferrer"
                style={{ display:'flex', alignItems:'center', gap:10, padding:'11px 15px', background:isZoom?'#EBF5FB':'#F0FAF0', borderRadius:7, textDecoration:'none', border:`1px solid ${isZoom?'#BEE3F8':'#C8E6C9'}` }}>
                <span style={{ fontSize:15 }}>{isZoom?'🎥':'📹'}</span>
                <span style={{ fontFamily:T.sans, fontSize:11, fontWeight:600, color:isZoom?'#1A6B9A':'#2E7D32' }}>{isZoom ? 'Join Zoom' : 'Join Google Meet'}</span>
                <span style={{ fontFamily:T.sans, fontSize:9, color:isZoom?'#3498DB':'#4CAF50', marginLeft:'auto', letterSpacing:'0.08em' }}>Open →</span>
              </a>
            </div>
          );
        })()}
        {(meeting.notesLink || meeting.pdfData) && (
          <div style={{ marginBottom:22, padding:'14px 16px', background:T.bgAlt, borderRadius:7, border:`1px solid ${T.border}` }}>
            <div style={{ fontFamily:T.sans, fontSize:8, fontWeight:700, letterSpacing:'0.14em', textTransform:'uppercase', color:T.text3, marginBottom:10 }}>Meeting Notes</div>
            {meeting.notesLink && (
              <div style={{ fontFamily:T.sans, fontSize:12, color:T.text2, lineHeight:1.7, whiteSpace:'pre-wrap', marginBottom: meeting.pdfData ? 12 : 0 }}>{meeting.notesLink}</div>
            )}
            {meeting.pdfData && (
              <a href={meeting.pdfData} download={meeting.pdfName || 'meeting-notes.pdf'}
                style={{ display:'inline-flex', alignItems:'center', gap:8, padding:'8px 14px', background:T.surface, border:`1px solid ${T.border}`, borderRadius:5, textDecoration:'none', marginTop: meeting.notesLink ? 4 : 0 }}>
                <span style={{ fontSize:13 }}>📎</span>
                <span style={{ fontFamily:T.sans, fontSize:11, fontWeight:600, color:T.accent }}>{meeting.pdfName || 'meeting-notes.pdf'}</span>
                <span style={{ fontFamily:T.sans, fontSize:9, color:T.text3, marginLeft:4 }}>Download</span>
              </a>
            )}
          </div>
        )}

        {isPast && (meeting.attendees||[]).length > 0 && (() => {
          const spaceNames = (team||[]).map(t => t.name).length
            ? (team||[]).map(t => t.name)
            : (ATTENDEE_OPTIONS['The Space At 9/2'] || []);
          const groups = [
            { group: 'The Space At 9/2', names: spaceNames },
            { group: 'Goodricke Group',  names: ATTENDEE_OPTIONS['Goodricke Group'] || [] },
          ];
          const allKnown = groups.flatMap(g => g.names);
          const byTeam = groups.map(({ group, names }) => ({
            group,
            members: (meeting.attendees||[]).filter(a => names.includes(a)),
          })).filter(g => g.members.length > 0);
          const others = (meeting.attendees||[]).filter(a => !allKnown.includes(a));
          if (others.length) byTeam.push({ group: 'Other', members: others });
          return (
            <div style={{ marginBottom:22 }}>
              <div style={{ fontFamily:T.sans, fontSize:8, fontWeight:700, letterSpacing:'0.18em', textTransform:'uppercase', color:T.text3, marginBottom:12 }}>Attendees</div>
              <div style={{ display:'flex', flexDirection:'column', gap:12 }}>
                {byTeam.map(({ group, members }) => (

                    <div style={{ fontFamily:T.sans, fontSize:8, fontWeight:700, letterSpacing:'0.1em', textTransform:'uppercase', color:T.text3, marginBottom:7 }}>{group}</div>
                    <div style={{ display:'flex', flexWrap:'wrap', gap:6 }}>
                      {members.map(name => (
                        <span key={name} style={{ display:'inline-flex', alignItems:'center', gap:6, padding:'5px 10px', borderRadius:4, background:T.bgAlt, border:`1px solid ${T.border}`, fontFamily:T.sans, fontSize:11, color:T.text1 }}>
                          <span style={{ width:20, height:20, borderRadius:'50%', background:T.accentBg, display:'inline-flex', alignItems:'center', justifyContent:'center', fontFamily:T.serif, fontSize:9, fontWeight:500, color:T.accent, flexShrink:0 }}>
                            {name.charAt(0)}
                          </span>
                          {name}
                        </span>
                      ))}
                    </div>
                  </div>
                ))}
              </div>
            </div>
          );
        })()}

        {isPast && meeting.summary ? (
          <>
            <div style={{ marginBottom:22 }}>
              <div style={{ fontFamily:T.sans, fontSize:8, fontWeight:700, letterSpacing:'0.18em', textTransform:'uppercase', color:T.text3, marginBottom:9 }}>Meeting Summary</div>
              <div style={{ fontFamily:T.sans, fontSize:12, lineHeight:1.75, color:T.text2 }}>{meeting.summary}</div>
            </div>
            {decisions.length > 0 && (
              <div style={{ marginBottom:22 }}>
                <div style={{ fontFamily:T.sans, fontSize:8, fontWeight:700, letterSpacing:'0.18em', textTransform:'uppercase', color:T.text3, marginBottom:10 }}>Key Decisions</div>
                {decisions.map((d,i) => (
                  <div key={i} style={{ display:'flex', gap:10, alignItems:'flex-start', marginBottom:8 }}>
                    <span style={{ color:T.complete, fontSize:13, flexShrink:0, marginTop:1 }}>✓</span>
                    <span style={{ fontFamily:T.sans, fontSize:12, color:T.text1, lineHeight:1.55 }}>{d}</span>
                  </div>
                ))}
              </div>
            )}
            {(teamItems.length > 0 || clientItems.length > 0) && (
              <div>
                <div style={{ fontFamily:T.sans, fontSize:8, fontWeight:700, letterSpacing:'0.18em', textTransform:'uppercase', color:T.text3, marginBottom:13 }}>Action Items</div>
                {teamItems.length > 0 && (
                  <div style={{ marginBottom:16 }}>
                    <div style={{ marginBottom:9 }}><span style={{ fontFamily:T.sans, fontSize:8, fontWeight:700, letterSpacing:'0.1em', textTransform:'uppercase', background:T.bgAlt, borderRadius:3, padding:'3px 8px', border:`1px solid ${T.border}`, color:T.text3 }}>Studio</span></div>
                    {teamItems.map((item,i) => (
                      <div key={i} style={{ display:'flex', gap:10, alignItems:'flex-start', marginBottom:8, opacity:item.done?0.45:1 }}>
                        <span style={{ color:item.done?T.complete:T.border, fontSize:13, flexShrink:0 }}>{item.done?'✓':'○'}</span>
                        <div>
                          <span style={{ fontFamily:T.sans, fontSize:11, color:item.done?T.text3:T.text1, textDecoration:item.done?'line-through':'none' }}>{item.task}</span>
                          {item.who && <span style={{ fontFamily:T.sans, fontSize:9, color:T.text3, marginLeft:7 }}>— {item.who}</span>}
                        </div>
                      </div>
                    ))}
                  </div>
                )}
                {clientItems.length > 0 && (
                  <div>
                    <div style={{ marginBottom:9 }}><span style={{ fontFamily:T.sans, fontSize:8, fontWeight:700, letterSpacing:'0.1em', textTransform:'uppercase', background:T.accentBg, borderRadius:3, padding:'3px 8px', border:`1px solid ${T.accent}30`, color:T.accent }}>From You</span></div>
                    {clientItems.map((item,i) => (
                      <div key={i} style={{ display:'flex', gap:10, alignItems:'flex-start', marginBottom:8, opacity:item.done?0.45:1 }}>
                        <span style={{ color:item.done?T.complete:T.accent, fontSize:13, flexShrink:0 }}>{item.done?'✓':'○'}</span>
                        <span style={{ fontFamily:T.sans, fontSize:11, color:item.done?T.text3:T.text1, textDecoration:item.done?'line-through':'none' }}>{item.task}</span>
                      </div>
                    ))}
                  </div>
                )}
              </div>
            )}
          </>
        ) : !isPast ? (
          <div style={{ padding:'16px 18px', background:T.bg, borderRadius:7, border:`1px solid ${T.border}` }}>
            <div style={{ fontFamily:T.sans, fontSize:12, color:T.text2, lineHeight:1.65 }}>This meeting hasn't taken place yet. Notes, decisions, and action items will appear here after the call.</div>
          </div>
        ) : null}
      </div>
    </div>
  );
}

/* ═══════════════════════════════════════
   APP
═══════════════════════════════════════ */
function App() {
  const [project,       setProject]       = useState(INITIAL_PROJECT);
  const [phases,        setPhases]        = useState(INITIAL_PHASES);
  const [team,          setTeam]          = useState(INITIAL_TEAM);
  const [presentations, setPresentations] = useState(INITIAL_PRESENTATIONS);
  const [meetings,      setMeetings]      = useState(INITIAL_MEETINGS);
  const [deliverables,  setDeliverables]  = useState(INITIAL_DELIVERABLES);
  const [deps,          setDeps]          = useState(INITIAL_DEPS);
  const [links,         setLinks]         = useState(INITIAL_LINKS);
  const [calBands,      setCalBands]      = useState(INITIAL_CAL_BANDS);
  const [calMonth,      setCalMonth]      = useState(() => { const d = new Date(); d.setDate(1); d.setHours(0,0,0,0); return d; });

  const [editMode,      setEditMode]      = useState(false);
  const [editModal,     setEditModal]     = useState(null);
  const [activeMeeting, setActiveMeeting] = useState(null);
  const [expandedDep,   setExpandedDep]   = useState(null);

  const [showPasscode, setShowPasscode]     = useState(false);
  const [passcodeVal,  setPasscodeVal]      = useState('');
  const [passcodeErr,  setPasscodeErr]      = useState(false);

  const submitPasscode = () => {
    if (passcodeVal === EDIT_PASSCODE) {
      setEditMode(true); setShowPasscode(false); setPasscodeVal(''); setPasscodeErr(false);
    } else {
      setPasscodeErr(true);
    }
  };

  // NEW: Dual theme
  const [isDark, setIsDark] = useState(false);
  const T = isDark ? DARK : LIGHT;

  // NEW: Timeline expansion
  const [activePhase, setActivePhase] = useState(null);

  // NEW: Meeting tabs
  const [meetingTab, setMeetingTab] = useState('upcoming');

  // NEW: Past meetings show-all
  const [showAllPast, setShowAllPast] = useState(false);

  // NEW: Deliverable groups open/closed
  const [openGroups, setOpenGroups] = useState({});

  /* ── LOAD + PERSIST  (JSONbin shared state, localStorage fallback) ── */
  const [loading, setLoading] = useState(JSONBIN_OK);
  const canSave = useRef(false);

  // Update body bg/color when theme changes
  useEffect(() => {
    document.body.style.background = T.bg;
    document.body.style.color = T.text1;
  }, [isDark]);

  useEffect(() => {
    // No backend → restore from localStorage and continue
    if (!JSONBIN_OK) {
      try {
        if (localStorage.getItem('goodricke_version') === String(DATA_VERSION)) {
          const r = (k, set, migrate) => { const v = localStorage.getItem(k); if (v) set(migrate ? migrate(JSON.parse(v)) : JSON.parse(v)); };
          r('goodricke_project',       setProject);
          r('goodricke_phases',        setPhases);
          r('goodricke_team',          setTeam);
          r('goodricke_presentations', setPresentations, migratePresentations);
          r('goodricke_meetings',      setMeetings,      migrateMeetings);
          r('goodricke_deliverables',  setDeliverables,  migrateDeliverables);
          r('goodricke_deps',          setDeps,  migrateDeps);
          r('goodricke_links',         setLinks);
          r('goodricke_cal_bands',     setCalBands);
        }
      } catch {}
      canSave.current = true;
      return;
    }
    // Backend → fetch latest snapshot
    const loadStart = Date.now();
    const MIN_LOADER_MS = 2000;
    (async () => {
      try {
        const res = await fetch(
          `https://api.jsonbin.io/v3/b/${JSONBIN_ID}/latest`,
          { headers: { 'X-Master-Key': JSONBIN_KEY } }
        );
        if (res.ok) {
          const { record } = await res.json();
          if (record.project)               setProject(record.project);
          if (record.phases?.length)        setPhases(record.phases);
          if (record.team?.length)          setTeam(record.team);
          if (record.presentations?.length) setPresentations(migratePresentations(record.presentations));
          if (record.meetings?.length)      setMeetings(migrateMeetings(record.meetings));
          if (record.deliverables?.length)  setDeliverables(migrateDeliverables(record.deliverables));
          if (record.deps?.length)          setDeps(migrateDeps(record.deps));
          if (record.links?.length)         setLinks(record.links);
          if (record.calBands?.length)      setCalBands(record.calBands);
        }
      } catch (err) {
        console.warn('Goodricke portal: JSONbin load failed; falling back to defaults', err);
      }
      const elapsed = Date.now() - loadStart;
      setTimeout(() => setLoading(false), Math.max(0, MIN_LOADER_MS - elapsed));
      canSave.current = true;
    })();
  }, []);

  useEffect(() => {
    if (!canSave.current) return;
    // localStorage mirror (always)
    try {
      localStorage.setItem('goodricke_version',       String(DATA_VERSION));
      localStorage.setItem('goodricke_project',       JSON.stringify(project));
      localStorage.setItem('goodricke_phases',        JSON.stringify(phases));
      localStorage.setItem('goodricke_team',          JSON.stringify(team));
      localStorage.setItem('goodricke_presentations', JSON.stringify(presentations));
      localStorage.setItem('goodricke_meetings',      JSON.stringify(meetings));
      localStorage.setItem('goodricke_deliverables',  JSON.stringify(deliverables));
      localStorage.setItem('goodricke_deps',          JSON.stringify(deps));
      localStorage.setItem('goodricke_links',         JSON.stringify(links));
      localStorage.setItem('goodricke_cal_bands',     JSON.stringify(calBands));
    } catch {}
    if (!JSONBIN_OK) return;
    // Debounced PUT to avoid spamming JSONbin during rapid edits
    const tid = setTimeout(() => {
      fetch(`https://api.jsonbin.io/v3/b/${JSONBIN_ID}`, {
        method:  'PUT',
        headers: { 'Content-Type': 'application/json', 'X-Master-Key': JSONBIN_KEY },
        body:    JSON.stringify({
          version: DATA_VERSION,
          project, phases, team, presentations,
          meetings, deliverables, deps, links, calBands,
        }),
      }).catch(err => console.warn('Goodricke portal: JSONbin save failed', err));
    }, 600);
    return () => clearTimeout(tid);
  }, [project, phases, team, presentations, meetings, deliverables, deps, links, calBands]);

  /* ── DERIVED PHASE STATUS + DISPLAY DATE ───────────────────────────────
     Three signals combined; highest level wins (phases never downgraded).
     Meetings are matched by TITLE KEYWORDS so rescheduled dates still link
     correctly. displayStart is set from the earliest keyword-matched meeting
     so the phase node shows the real meeting date, not the stale stored date.

     Level scale:
       0  Yet to begin / On hold
       1  Kick-off  (meeting Scheduled)
       2  In Progress  (deliverable active/done · meeting Done · milestone Done)
       3  Awaiting Feedback  (milestone Scheduled)
       5  Submitted — Handover remaining
       6  Handover Complete  (all phase deliverables done)
  ─────────────────────────────────────────────────────────────────────── */
  /* ── DERIVED MILESTONES ─────────────────────────────────────────────
     Milestones (presentations, e.g. "ms1") and meetings (e.g. "m1") are
     tracked as separate records but represent the same real-world event,
     linked here by matching numeric ID suffix (ms1 ↔ m1, ms2 ↔ m2, ...).
     Matching by ID rather than date means a rescheduled meeting still
     resolves correctly — the milestone's date AND status follow the
     meeting automatically, so the "Next" banner never shows a stale date.
  ─────────────────────────────────────────────────────────────────────── */
  const effectivePresentations = useMemo(() => {
    return presentations.map(p => {
      const n = p.id.match(/^ms(\d+)$/)?.[1];
      const linked = n ? meetings.find(m => m.id === 'm' + n) : null;
      if (!linked) return p;
      const status = linked.status === 'Done' ? 'Done' : linked.status === 'Scheduled' ? 'Scheduled' : 'Pending';
      const date = linked.date || p.date;
      return (status !== p.status || date !== p.date) ? { ...p, status, date } : p;
    });
  }, [presentations, meetings]);

  const effectivePhases = useMemo(() => {
    const lvl = s => ({
      'Yet to begin':0, 'On hold':0,
      'Kick-off':1, 'Research':1,
      'In Progress':2, 'Design – In Progress':2, 'In Development':2,
      'Awaiting Content':3, 'Presentation scheduled':3, 'Awaiting Feedback':3,
      'Refining basis feedback':4, 'Creating Print ready files':4,
      'Submitted - Handover remaining':5,
      'Handover Complete':6, 'Complete':7,
    }[s] ?? 0);

    return phases.map(phase => {
      let best         = phase.status; // start from manually-stored status
      let displayStart = null;         // overrides shown date if meetings found

      // ── 1. Deliverables ────────────────────────────────────────────
      {
        const dels = deliverables.filter(d => d.phase === phase.name);
        if (dels.length > 0) {
          const allDone   = dels.every(d => getStatusGroup(d.status) === 'done');
          const anyActive = dels.some(d =>  getStatusGroup(d.status) === 'active');
          const anyDone   = dels.some(d =>  getStatusGroup(d.status) === 'done');
          const candidate = allDone ? 'Handover Complete'
                          : (anyActive || anyDone) ? 'In Progress'
                          : 'Yet to begin';
          if (lvl(candidate) > lvl(best)) best = candidate;
        }
      }

      // ── 2. Meetings — keyword-matched (primary) or date range (fallback) ─
      const keyMtgs = meetings.filter(m => meetingPhaseId(m) === phase.id);
      const origPs  = pd(phase.start);
      const origPe  = new Date(pd(phase.end).getTime() + 86400000);
      const rangeMtgs = meetings.filter(m => { const d = pd(m.date); return d >= origPs && d <= origPe; });
      const phaseMtgs = keyMtgs.length > 0 ? keyMtgs : rangeMtgs;

      if (phaseMtgs.length > 0) {
        // Derive displayStart from earliest matched meeting
        const earliest = [...phaseMtgs].sort((a,b) => pd(a.date)-pd(b.date))[0].date;
        displayStart = earliest;
        if (phaseMtgs.some(m => m.status === 'Done')      && lvl('In Progress') > lvl(best)) best = 'In Progress';
        if (phaseMtgs.some(m => m.status === 'Scheduled') && lvl('Kick-off')    > lvl(best)) best = 'Kick-off';
      }

      // ── 3. Milestone presentations — always use original date range ─
      const phasePres = effectivePresentations.filter(e => { const d = pd(e.date); return d >= origPs && d <= origPe; });
      if (phasePres.some(e => e.status === 'Done')      && lvl('In Progress')           > lvl(best)) best = 'In Progress';
      if (phasePres.some(e => e.status === 'Scheduled') && lvl('Presentation scheduled') > lvl(best)) best = 'Presentation scheduled';

      const changed = best !== phase.status || displayStart !== null;
      return changed
        ? { ...phase, status: best, ...(displayStart ? { displayStart } : {}) }
        : phase;
    });
  }, [phases, deliverables, meetings, effectivePresentations]);

  const progress        = computeProgress(effectivePhases, effectivePresentations);
  const currentPhase    = getCurrentPhase(effectivePhases);
  const clientSt        = currentPhase ? (INTERNAL_TO_CLIENT[currentPhase.status] || 'In Progress') : 'In Progress';
  const clientPhaseName = currentPhase ? (currentPhase.clientName || currentPhase.name) : '';
  const nextMilestone   = getNextMilestone(effectivePresentations);
  const pendingDeps     = deps.filter(d => d.status !== 'Completed').length;
  const today0 = (() => { const d = new Date(); d.setHours(0,0,0,0); return d; })();
  const upcomingMeetings = meetings.filter(m => m.status !== 'Done' && pd(m.date) >= today0).sort((a,b) => pd(a.date)-pd(b.date));
  const pastMeetings     = meetings.filter(m => m.status === 'Done'  || pd(m.date) < today0).sort((a,b) => pd(b.date)-pd(a.date));

  /* ── SAVE / DELETE HANDLERS ── */
  function saveEdit(draft) {
    if (!editModal) return;
    const { type, isNew } = editModal;
    const withId = isNew ? { ...draft, id: type + uid() } : draft;
    if (type === 'phase')       { isNew ? setPhases(p=>[...p,withId])       : setPhases(p=>p.map(x=>x.id===draft.id?draft:x)); }
    else if (type === 'team')   { isNew ? setTeam(p=>[...p,withId])         : setTeam(p=>p.map(x=>x.id===draft.id?draft:x)); }
    else if (type === 'meeting'){
      isNew ? setMeetings(p=>[...p,withId]) : setMeetings(p=>p.map(x=>x.id===draft.id?draft:x));
      // Sync linked milestone (m1↔ms1, m2↔ms2, ...) — write date+status back to presentations state
      if (!isNew) {
        const n = draft.id.match(/^m(\d+)$/)?.[1];
        if (n) {
          const msStatus = draft.status === 'Done' ? 'Done' : draft.status === 'Scheduled' ? 'Scheduled' : 'Pending';
          setPresentations(p => p.map(x => x.id === 'ms'+n ? { ...x, date: draft.date || x.date, status: msStatus } : x));
        }
      }
    }
    else if (type === 'deliverable'){ isNew ? setDeliverables(p=>[...p,withId]) : setDeliverables(p=>p.map(x=>x.id===draft.id?draft:x)); }
    else if (type === 'dep')    { isNew ? setDeps(p=>[...p,withId])         : setDeps(p=>p.map(x=>x.id===draft.id?draft:x)); }
    else if (type === 'link')   { setLinks(p=>p.map(folder=>({ ...folder, subFolders: folder.subFolders.map(sf=>sf.id===draft.id?{...draft}:sf) }))); }
    else if (type === 'calband'){ isNew ? setCalBands(p=>[...p,withId]) : setCalBands(p=>p.map(x=>x.id===draft.id?draft:x)); }
    setEditModal(null);
  }

  function deleteEdit(draft) {
    const { type } = editModal;
    if (type === 'phase')       setPhases(p=>p.filter(x=>x.id!==draft.id));
    else if (type === 'team')   setTeam(p=>p.filter(x=>x.id!==draft.id));
    else if (type === 'meeting')setMeetings(p=>p.filter(x=>x.id!==draft.id));
    else if (type === 'deliverable') setDeliverables(p=>p.filter(x=>x.id!==draft.id));
    else if (type === 'dep')    setDeps(p=>p.filter(x=>x.id!==draft.id));
    else if (type === 'calband')setCalBands(p=>p.filter(x=>x.id!==draft.id));
    setEditModal(null);
  }

  const openEdit = (type, item) => setEditModal({ type, item: { ...item }, isNew: false });
  const openAdd  = (type, def)  => setEditModal({ type, item: def, isNew: true });

  function shiftPhaseDates(phase, diff) {
    if (!diff) return;
    const ps = pd(phase.start), pe = new Date(pd(phase.end).getTime() + 86400000);
    setDeliverables(list => list.map(d => d.phase === phase.name && d.due ? { ...d, due: addDays(d.due, diff) } : d));
    setMeetings(list => list.map(m => meetingPhaseId(m) === phase.id ? { ...m, date: addDays(m.date, diff) } : m));
    setPresentations(list => list.map(p => { const dt = pd(p.date); return (dt >= ps && dt <= pe) ? { ...p, date: addDays(p.date, diff) } : p; }));
    setDeps(list => list.map(d => { if (!d.due) return d; const dt = pd(d.due); return (dt >= ps && dt <= pe) ? { ...d, due: addDays(d.due, diff) } : d; }));
  }

  const cycleStatus = (d) => {
    const idx  = STATUS_CYCLE.indexOf(d.status);
    const next = STATUS_CYCLE[idx === -1 || idx === STATUS_CYCLE.length - 1 ? 0 : idx + 1];
    setDeliverables(p => p.map(x => x.id === d.id ? { ...x, status: next } : x));
  };

  const movePhase = (id, dir) => {
    setPhases(prev => {
      const idx = prev.findIndex(p => p.id === id);
      if (dir === 'left' && idx === 0) return prev;
      if (dir === 'right' && idx === prev.length - 1) return prev;
      const next = [...prev];
      const swap = dir === 'left' ? idx - 1 : idx + 1;
      [next[idx], next[swap]] = [next[swap], next[idx]];
      return next;
    });
  };

  const moveDeliverable = (id, dir) => {
    setDeliverables(prev => {
      const idx = prev.findIndex(d => d.id === id);
      if (dir === 'up' && idx === 0) return prev;
      if (dir === 'down' && idx === prev.length - 1) return prev;
      const next = [...prev];
      const swap = dir === 'up' ? idx - 1 : idx + 1;
      [next[idx], next[swap]] = [next[swap], next[idx]];
      return next;
    });
  };

  // Build deliverable phase groups
  const phaseGroupOrder = [];
  const phaseGroupMap = {};
  deliverables.forEach(d => {
    if (!phaseGroupMap[d.phase]) { phaseGroupMap[d.phase] = []; phaseGroupOrder.push(d.phase); }
    phaseGroupMap[d.phase].push(d);
  });

  // Initialize openGroups — all collapsed by default
  useEffect(() => {
    const init = {};
    phaseGroupOrder.forEach(p => { init[p] = false; });
    setOpenGroups(init);
  }, []);

  const toggleGroup = (phase) => {
    setOpenGroups(prev => ({ ...prev, [phase]: !prev[phase] }));
  };

  const scrollTo = (id) => {
    document.getElementById(id)?.scrollIntoView({ behavior:'smooth', block:'start' });
  };

  /* ── LOADING SCREEN ── */
  if (loading) {
    return (
      <div style={{ minHeight:'100vh', background:'#F7F5F0', display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center', gap:24 }}>
        <div style={{ display:'inline-flex', flexDirection:'column', alignItems:'center', gap:8 }}>
          <img src="Goodricke%20logo.png" alt="Goodricke" style={{ height:160, width:'auto' }} />
          <div style={{ fontFamily:"'Inter', sans-serif", fontSize:8.5, fontWeight:600, letterSpacing:'0.22em', textTransform:'uppercase', color:'#9E9890' }}>Project Portal</div>
        </div>
        <div style={{ fontFamily:"'Inter', sans-serif", fontSize:9, color:'#9E9890', letterSpacing:'0.06em' }}>Loading latest…</div>
      </div>
    );
  }

  const navLinks = [
    { id:'overview', label:'Overview' },
    { id:'timeline', label:'Timeline' },
    { id:'team', label:'Team' },
    { id:'meetings', label:'Meetings' },
    { id:'deliverables', label:'Deliverables' },
    { id:'inputs', label:'Client Deliverables' },
    { id:'calendar', label:'Calendar' },
    { id:'files', label:'Files' },
  ];

  /* ── RENDER ── */
  return (
    <ThemeCtx.Provider value={T}>
    <div style={{ minHeight:'100vh', background:T.bg, color:T.text1 }}>

      {/* ════════════════════════════════
          NAVIGATION (sticky, 54px)
      ════════════════════════════════ */}
      <header style={{ position:'sticky', top:0, zIndex:100, height:54, background: isDark ? 'rgba(20,19,18,0.97)' : 'rgba(247,245,240,0.97)', backdropFilter:'blur(12px)', WebkitBackdropFilter:'blur(12px)', borderBottom:`1px solid ${T.borderHair}`, display:'flex', alignItems:'center' }}>
        <div style={{ maxWidth:960, margin:'0 auto', width:'100%', padding:'0 28px', display:'flex', alignItems:'center', gap:20 }}>


          {/* Section links */}
          <nav style={{ flex:1, display:'flex', alignItems:'center', justifyContent:'center', gap:22 }}>
            {navLinks.map(link => (
              <button key={link.id}
                onClick={() => scrollTo(link.id)}
                style={{ background:'none', border:'none', cursor:'pointer', fontFamily:T.sans, fontSize:8, fontWeight:600, letterSpacing:'0.12em', textTransform:'uppercase', color:T.text3, padding:'4px 0', transition:'color 0.15s' }}
                onMouseEnter={e=>e.currentTarget.style.color=T.text1}
                onMouseLeave={e=>e.currentTarget.style.color=T.text3}>
                {link.label}
              </button>
            ))}
          </nav>

          {/* Right: theme toggle + edit */}
          <div style={{ display:'flex', alignItems:'center', gap:10, flexShrink:0 }}>
            <button
              onClick={() => setIsDark(d => !d)}
              style={{ background:'none', border:'none', cursor:'pointer', fontSize:16, color:T.text3, padding:'4px', lineHeight:1, transition:'color 0.15s' }}
              title={isDark ? 'Switch to light mode' : 'Switch to dark mode'}>
              {isDark ? '☀' : '◑'}
            </button>
            <button
              onClick={() => editMode ? setEditMode(false) : setShowPasscode(true)}
              style={{
                background: editMode ? T.accent : 'transparent',
                color: editMode ? '#fff' : T.text3,
                border: `1px solid ${editMode ? T.accent : T.border}`,
                borderRadius:4, padding:'4px 11px', fontFamily:T.sans, fontSize:8, fontWeight:700,
                letterSpacing:'0.12em', textTransform:'uppercase', cursor:'pointer',
                transition:'all 0.18s',
              }}>
              {editMode ? '✏ Editing' : '✏ Edit'}
            </button>
          </div>

        </div>
      </header>

      <div style={{ maxWidth:960, margin:'0 auto', padding:'0 28px 80px' }}>

        {/* ════════════════════════════════
            HERO / OVERVIEW (id="overview")
        ════════════════════════════════ */}
        <section id="overview" style={{ paddingTop:56, paddingBottom:48, borderBottom:`1px solid ${T.borderHair}` }}>
          <div style={{ display:'flex', justifyContent:'space-between', alignItems:'flex-start', flexWrap:'wrap', gap:24, marginBottom:28 }}>
            {/* Left */}
            <div>
              <div style={{ fontFamily:T.sans, fontSize:9, fontWeight:700, letterSpacing:'0.18em', textTransform:'uppercase', color:T.text3, marginBottom:8 }}>
                <EditableText value={project.category} editMode={editMode} onChange={v=>setProject(p=>({...p,category:v}))} style={{ fontFamily:T.sans, fontSize:9, fontWeight:700, letterSpacing:'0.18em', textTransform:'uppercase', color:T.text3 }} />
              </div>
              <div style={{ fontFamily:T.serif, fontSize:30, fontWeight:500, color:T.text1, lineHeight:1.2 }}>
                <EditableText value={project.name} editMode={editMode} onChange={v=>setProject(p=>({...p,name:v}))} style={{ fontFamily:T.serif, fontSize:30, fontWeight:500, color:T.text1 }} />
              </div>
            </div>
            {/* Right */}
            <div style={{ textAlign:'right' }}>
              <div style={{ fontFamily:T.serif, fontSize:42, fontWeight:400, color:T.text1, lineHeight:1, letterSpacing:'-0.03em' }}>{progress}%</div>
              <div style={{ fontFamily:T.sans, fontSize:8, color:T.text3, marginTop:4, letterSpacing:'0.06em', textTransform:'uppercase' }}>Overall completion</div>
            </div>
          </div>

          {/* Progress bar */}
          <div style={{ height:4, background:T.bgAlt, borderRadius:2, overflow:'hidden', marginBottom:20 }}>
            <div style={{ height:'100%', width:`${progress}%`, background:`linear-gradient(90deg, ${project.color}, ${project.color}BB)`, borderRadius:2, transition:'width 0.8s ease' }}/>
          </div>

          {/* Inline metadata */}
          <div style={{ display:'flex', gap:24, flexWrap:'wrap', alignItems:'center' }}>
            <div style={{ display:'flex', alignItems:'center', gap:6 }}>
              <span style={{ fontFamily:T.sans, fontSize:9, color:T.text3 }}>Timeline</span>
              <span style={{ fontFamily:T.sans, fontSize:10, fontWeight:500, color:T.text2 }}>
                {editMode ? (
                  <span style={{ display:'flex', alignItems:'center', gap:6 }}>
                    <input type="date" className="form-input" value={project.startDate} onChange={e=>setProject(p=>({...p,startDate:e.target.value}))} style={{ width:120, fontSize:10, padding:'2px 7px', background:T.surface, border:`1px solid ${T.border}`, color:T.text1, borderRadius:4 }} />
                    <span style={{ color:T.text3 }}>→</span>
                    <input type="date" className="form-input" value={project.endDate} onChange={e=>setProject(p=>({...p,endDate:e.target.value}))} style={{ width:120, fontSize:10, padding:'2px 7px', background:T.surface, border:`1px solid ${T.border}`, color:T.text1, borderRadius:4 }} />
                  </span>
                ) : `${fmtShort(project.startDate)} – ${fmtShort(project.endDate)}`}
              </span>
            </div>
            <span style={{ color:T.borderHair, fontSize:14 }}>·</span>
            <div style={{ display:'flex', alignItems:'center', gap:6 }}>
              <span style={{ fontFamily:T.sans, fontSize:9, color:T.text3 }}>Phase</span>
              <span style={{ fontFamily:T.sans, fontSize:10, fontWeight:600, color:T.text1 }}>{clientPhaseName}</span>
            </div>
            {nextMilestone && <>
              <span style={{ color:T.borderHair, fontSize:14 }}>·</span>
              <div style={{ display:'flex', alignItems:'center', gap:6 }}>
                <span style={{ fontFamily:T.sans, fontSize:9, color:T.text3 }}>Next</span>
                <span style={{ fontFamily:T.sans, fontSize:10, fontWeight:600, color:T.accent }}>
                  {fmtShort(nextMilestone.date)}{nextMilestone.notes ? ` · ${nextMilestone.notes}` : ''}
                </span>
              </div>
            </>}
          </div>
        </section>

        {/* ════════════════════════════════
            HORIZONTAL TIMELINE (id="timeline")
        ════════════════════════════════ */}
        <section id="timeline" style={{ paddingTop:48, paddingBottom:48, borderBottom:`1px solid ${T.borderHair}` }}>
          <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:28 }}>
            <div style={{ fontFamily:T.sans, fontSize:8, fontWeight:700, letterSpacing:'0.22em', textTransform:'uppercase', color:T.text3 }}>Project Phases</div>
            {editMode && <button className="add-btn" style={{ border:`1px dashed ${T.accent}70`, color:T.accent, padding:'5px 12px', marginTop:0 }} onClick={() => openAdd('phase', { name:'New Phase', clientName:'New Phase', start:'2026-07-01', end:'2026-07-15', status:'Yet to begin', description:'', keyOutputs:[], color:'#ABA49C', light:'#EDEBE5' })}>+ Add Phase</button>}
          </div>

          {/* Horizontal phase row */}
          <div style={{ display:'flex', alignItems:'flex-start', overflowX:'auto', paddingTop:8, paddingBottom:8 }}>
            {effectivePhases.map((phase, i, arr) => {
              const isComp   = COMPLETE_STATUSES.has(phase.status);
              const isActive = ACTIVE_STATUSES.has(phase.status);
              const isLast   = i === arr.length - 1;
              const isExpanded = activePhase === phase.id;
              const nodeOpacity = (!isComp && !isActive && !isExpanded) ? 0.45 : 1;
              const lineColor = isComp ? T.complete : T.borderHair;
              const color = phase.color || '#ABA49C';
              const light = phase.light || T.bgAlt;

              return (
                <div key={phase.id} style={{ display:'flex', alignItems:'flex-start', flex: isLast ? 0 : 1, minWidth:0 }}>
                  {/* Node + label */}
                  <div className="phase-node" style={{ display:'flex', flexDirection:'column', alignItems:'center', gap:8, opacity:nodeOpacity, cursor:'pointer', flexShrink:0 }}
                    onClick={() => setActivePhase(isExpanded ? null : phase.id)}>
                    <div style={{
                      width:28, height:28, borderRadius:'50%', display:'flex', alignItems:'center', justifyContent:'center', flexShrink:0,
                      background: isComp ? T.complete : isActive ? 'transparent' : T.bgAlt,
                      border: isComp ? `2px solid ${T.complete}` : isActive ? `2px solid ${T.accent}` : `2px solid ${T.borderHair}`,
                      transition:'all 0.2s',
                      boxShadow: isExpanded ? `0 0 0 3px ${T.text1}30` : 'none',
                    }}>
                      {isComp
                        ? <span style={{ color:'#fff', fontSize:12, fontWeight:700 }}>✓</span>
                        : <span style={{ fontFamily:T.sans, fontSize:9, fontWeight:700, color:isActive?T.accent:T.text3 }}>{i+1}</span>
                      }
                    </div>
                    <div style={{ textAlign:'center', maxWidth:72 }}>
                      <div style={{ fontFamily:T.sans, fontSize:8, fontWeight:isExpanded?700:isActive?600:600, color:isExpanded?T.text1:isActive?T.text1:T.text2, letterSpacing:'0.02em', whiteSpace:'nowrap', overflow:'hidden', textOverflow:'ellipsis', maxWidth:72 }}>
                        {PHASE_SHORT[phase.clientName||phase.name] || (phase.clientName||phase.name)}
                      </div>
                      <div style={{ fontFamily:T.sans, fontSize:7, color:T.text3, marginTop:2, whiteSpace:'nowrap' }}>{fmtShort(phase.displayStart || phase.start)}</div>
                      {isExpanded && (
                        <div style={{ width:0, height:0, borderLeft:'4px solid transparent', borderRight:'4px solid transparent', borderTop:`5px solid ${T.text1}`, margin:'5px auto 0' }} />
                      )}
                    </div>
                  </div>
                  {/* Connector line */}
                  {!isLast && (
                    <div style={{ flex:1, height:2, background:lineColor, marginTop:13, minWidth:12, transition:'background 0.3s' }} />
                  )}
                </div>
              );
            })}
          </div>

          {/* Expansion panel */}
          {activePhase && (() => {
            const phase = effectivePhases.find(p => p.id === activePhase);
            if (!phase) return null;
            const cSt   = INTERNAL_TO_CLIENT[phase.status] || 'Not Started';
            const color = phase.color || '#ABA49C';
            const light = phase.light || T.bgAlt;
            const phaseIdx = phases.findIndex(p => p.id === phase.id);

            // Deliverable progress for this phase
            const phaseDelivs = deliverables.filter(d => d.phase === phase.name);
            const doneCount   = phaseDelivs.filter(d => getStatusGroup(d.status) === 'done').length;
            const activeCount = phaseDelivs.filter(d => getStatusGroup(d.status) === 'active').length;
            const pct = phaseDelivs.length > 0 ? Math.round((doneCount / phaseDelivs.length) * 100) : null;

            // Linked meetings for this phase
            const linkedMtgs = meetings.filter(m => meetingPhaseId(m) === phase.id);

            return (
              <div style={{ marginTop:24, background:T.surface, border:`1px solid ${T.border}`, borderRadius:8, overflow:'hidden', transition:'all 0.2s' }}>
                {/* Color accent bar */}
                <div style={{ height:3, background:`linear-gradient(90deg, ${color}, ${color}88)` }} />

                <div style={{ padding:'18px 24px 20px' }}>
                  {/* Header row */}
                  <div style={{ display:'flex', justifyContent:'space-between', alignItems:'flex-start', marginBottom:14 }}>
                    <div style={{ flex:1, minWidth:0, marginRight:16 }}>
                      <div style={{ fontFamily:T.sans, fontSize:13, fontWeight:600, color:T.text1, marginBottom:6 }}>{phase.clientName || phase.name}</div>
                      {/* Date range — editable in editMode */}
                      {editMode ? (
                        <div style={{ display:'flex', alignItems:'center', gap:6 }}>
                          <input type="date" value={phase.start || ''} onChange={e => setPhases(ps => ps.map(p => p.id===phase.id ? {...p, start:e.target.value} : p))}
                            style={{ fontFamily:T.sans, fontSize:10, color:T.text2, border:`1px solid ${T.border}`, borderRadius:3, padding:'2px 5px', background:T.bg }} />
                          <span style={{ fontFamily:T.sans, fontSize:10, color:T.text3 }}>–</span>
                          <input type="date" value={phase.end || ''} onChange={e => setPhases(ps => ps.map(p => p.id===phase.id ? {...p, end:e.target.value} : p))}
                            style={{ fontFamily:T.sans, fontSize:10, color:T.text2, border:`1px solid ${T.border}`, borderRadius:3, padding:'2px 5px', background:T.bg }} />
                        </div>
                      ) : (
                        <div style={{ fontFamily:T.sans, fontSize:10, color:T.text3 }}>{fmtShort(phase.start)} – {fmtShort(phase.end)}</div>
                      )}
                    </div>
                    <div style={{ display:'flex', gap:8, alignItems:'center', flexShrink:0 }}>
                      {/* Status — dropdown in editMode, pill otherwise */}
                      {editMode ? (
                        <select value={phase.status} onChange={e => setPhases(ps => ps.map(p => p.id===phase.id ? {...p, status:e.target.value} : p))}
                          style={{ fontFamily:T.sans, fontSize:10, color:T.text2, border:`1px solid ${T.border}`, borderRadius:4, padding:'3px 6px', background:T.bg, cursor:'pointer' }}>
                          {INTERNAL_STATUS_OPTIONS.map(s => <option key={s} value={s}>{s}</option>)}
                        </select>
                      ) : (
                        <Pill color={cColor(cSt)} bg={cBg(cSt)} size={7}>{cSt}</Pill>
                      )}
                      {editMode && (
                        <div style={{ display:'flex', gap:3 }}>
                          <button onClick={() => movePhase(phase.id, 'left')} disabled={phaseIdx === 0} title="Move earlier"
                            style={{ background:'none', border:`1px solid ${T.border}`, borderRadius:3, padding:'2px 7px', fontSize:10, cursor:phaseIdx===0?'default':'pointer', color:phaseIdx===0?T.text3:T.text2, opacity:phaseIdx===0?0.3:1 }}>←</button>
                          <button onClick={() => movePhase(phase.id, 'right')} disabled={phaseIdx === phases.length - 1} title="Move later"
                            style={{ background:'none', border:`1px solid ${T.border}`, borderRadius:3, padding:'2px 7px', fontSize:10, cursor:phaseIdx===phases.length-1?'default':'pointer', color:phaseIdx===phases.length-1?T.text3:T.text2, opacity:phaseIdx===phases.length-1?0.3:1 }}>→</button>
                          <EditBadge onClick={() => openEdit('phase', phase)} />
                        </div>
                      )}
                    </div>
                  </div>

                  {/* Description */}
                  {phase.description && (
                    <div style={{ fontFamily:T.sans, fontSize:11, color:T.text2, lineHeight:1.7, marginBottom:14 }}>{phase.description}</div>
                  )}

                  {/* Deliverable progress bar */}
                  {phaseDelivs.length > 0 && (
                    <div style={{ marginBottom:14 }}>
                      <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:5 }}>
                        <span style={{ fontFamily:T.sans, fontSize:8, fontWeight:700, letterSpacing:'0.12em', textTransform:'uppercase', color:T.text3 }}>Deliverables</span>
                        <span style={{ fontFamily:T.sans, fontSize:9, color:T.text3 }}>{doneCount} of {phaseDelivs.length} complete{activeCount > 0 ? ` · ${activeCount} in progress` : ''}</span>
                      </div>
                      <div style={{ height:4, background:T.bgAlt, borderRadius:2, overflow:'hidden' }}>
                        <div style={{ height:'100%', width:`${pct}%`, background:color, borderRadius:2, transition:'width 0.4s' }} />
                      </div>
                    </div>
                  )}

                  {/* Linked meetings */}
                  {linkedMtgs.length > 0 && (
                    <div style={{ marginBottom:14 }}>
                      <div style={{ fontFamily:T.sans, fontSize:8, fontWeight:700, letterSpacing:'0.12em', textTransform:'uppercase', color:T.text3, marginBottom:6 }}>Meetings</div>
                      <div style={{ display:'flex', flexDirection:'column', gap:4 }}>
                        {linkedMtgs.map(m => (
                          <div key={m.id} className={editMode ? 'edit-row' : ''} style={{ display:'flex', alignItems:'center', gap:8, padding:'3px 0' }}>
                            <span style={{ width:5, height:5, borderRadius:'50%', background: m.status==='Done' ? color : m.status==='Scheduled' ? T.accent : T.text3, flexShrink:0 }} />
                            <span style={{ fontFamily:T.sans, fontSize:10, color:T.text2, flex:1 }}>{m.title}</span>
                            <span style={{ fontFamily:T.sans, fontSize:9, color:T.text3 }}>{fmtShort(m.date)}</span>
                            <span style={{ fontFamily:T.sans, fontSize:8, color: m.status==='Done' ? color : T.text3, opacity:0.8 }}>{m.status}</span>
                            {editMode && <EditBadge onClick={() => openEdit('meeting', m)} />}
                          </div>
                        ))}
                      </div>
                    </div>
                  )}

                  {/* Key outputs */}
                  {phase.keyOutputs && phase.keyOutputs.length > 0 && (
                    <div>
                      <div style={{ fontFamily:T.sans, fontSize:8, fontWeight:700, letterSpacing:'0.12em', textTransform:'uppercase', color:T.text3, marginBottom:6 }}>Key Outputs</div>
                      <div style={{ display:'flex', gap:5, flexWrap:'wrap' }}>
                        {phase.keyOutputs.map((o,j) => (
                          <span key={j} style={{ fontFamily:T.sans, fontSize:9, color:color, background:light, padding:'3px 9px', borderRadius:3, border:`1px solid ${color}22` }}>{o}</span>
                        ))}
                      </div>
                    </div>
                  )}
                </div>
              </div>
            );
          })()}
        </section>

        {/* ════════════════════════════════
            TEAM (id="team")
        ════════════════════════════════ */}
        <section id="team" style={{ paddingTop:48, paddingBottom:48, borderBottom:`1px solid ${T.borderHair}` }}>
          <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:28 }}>
            <div style={{ fontFamily:T.sans, fontSize:8, fontWeight:700, letterSpacing:'0.22em', textTransform:'uppercase', color:T.text3 }}>Project Team</div>
            {editMode && <button className="add-btn" style={{ border:`1px dashed ${T.accent}70`, color:T.accent, padding:'5px 12px', marginTop:0 }} onClick={() => openAdd('team', { name:'', role:'', responsibility:'' })}>+ Add Member</button>}
          </div>
          <div style={{ display:'grid', gridTemplateColumns:'repeat(auto-fill, minmax(200px, 1fr))', gap:'0 40px' }}>
            {team.map((member, i) => (
              <div key={member.id} className="edit-row" style={{ padding:'20px 0', position:'relative' }}>
                <div style={{ display:'flex', justifyContent:'space-between', alignItems:'flex-start', marginBottom:12 }}>
                  <div style={{ width:32, height:32, borderRadius:'50%', background:T.accentBg, display:'flex', alignItems:'center', justifyContent:'center' }}>
                    <span style={{ fontFamily:T.serif, fontSize:13, fontWeight:500, color:T.accent }}>{member.name.charAt(0)}</span>
                  </div>
                  {editMode && <EditBadge onClick={() => openEdit('team', member)} />}
                </div>
                <div style={{ fontFamily:T.sans, fontSize:13, fontWeight:600, color:T.text1, marginBottom:3 }}>{member.name}</div>
                <div style={{ fontFamily:T.sans, fontSize:8, fontWeight:700, color:T.accent, letterSpacing:'0.06em', textTransform:'uppercase', marginBottom:8 }}>{member.role}</div>
                {member.responsibility && <div style={{ fontFamily:T.sans, fontSize:11, color:T.text2, lineHeight:1.6 }}>{member.responsibility}</div>}
              </div>
            ))}
          </div>
        </section>

        {/* ════════════════════════════════
            MEETINGS (id="meetings")
        ════════════════════════════════ */}
        <section id="meetings" style={{ paddingTop:48, paddingBottom:48, borderBottom:`1px solid ${T.borderHair}` }}>
          <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:20 }}>
            <div style={{ fontFamily:T.sans, fontSize:8, fontWeight:700, letterSpacing:'0.22em', textTransform:'uppercase', color:T.text3 }}>Meetings &amp; Presentations</div>

                      </div>

                      {/* Status dot */}
                      <div style={{ flexShrink:0, paddingTop:3 }}>
                        <div

                          title={editMode ? `Click to advance: ${d.status}` : d.status}
                          style={{ width:10, height:10, borderRadius:'50%', background:dotColor, opacity:group==='notstarted'?0.25:1, cursor:editMode?'pointer':'default', transition:'background 0.3s', boxShadow:editMode?`0 0 0 2px ${dotColor}30`:'none' }} />

                                <button onClick={() => moveDeliverable(d.id, 'down')} disabled={globalIdx===deliverables.length-1}

        {/* ════════════════════════════════
            CALENDAR (id="calendar")
        ════════════════════════════════ */}
        <section id="calendar" style={{ paddingTop:48, paddingBottom:48, borderBottom:`1px solid ${T.borderHair}` }}>
          {(() => {
            const today      = new Date(); today.setHours(0,0,0,0);
            const year       = calMonth.getFullYear();
            const month      = calMonth.getMonth();
            const daysInMonth= new Date(year, month+1, 0).getDate();
            const firstDow   = new Date(year, month, 1).getDay();
            const cells      = [...Array(firstDow).fill(null), ...Array.from({length:daysInMonth},(_,i)=>i+1)];
            while (cells.length % 7 !== 0) cells.push(null);
            const weeks = [];
            for (let i=0; i<cells.length; i+=7) weeks.push(cells.slice(i,i+7));
            const fmt2   = n => String(n).padStart(2,'0');
            const toDate = d => d ? `${year}-${fmt2(month+1)}-${fmt2(d)}` : null;
            const prevMonth = new Date(year, month-1, 1);
            const nextMonth = new Date(year, month+1, 1);
            const DOW = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
            const mtgByDay = {};
            meetings.forEach(m => { if (m.date) (mtgByDay[m.date] = mtgByDay[m.date]||[]).push(m); });
            const presByDay = {};
            effectivePresentations.forEach(p => { if (p.date) (presByDay[p.date] = presByDay[p.date]||[]).push(p); });
            return (
              <div>
                {/* Nav row */}
                <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', marginBottom:24 }}>
                  <div style={{ display:'flex', alignItems:'center', gap:14 }}>
                    <button onClick={() => setCalMonth(prevMonth)}
                      style={{ background:'none', border:`1px solid ${T.border}`, borderRadius:6, width:30, height:30, display:'flex', alignItems:'center', justifyContent:'center', cursor:'pointer', color:T.text1, fontSize:15 }}>‹</button>
                    <span style={{ fontFamily:T.serif, fontSize:24, fontWeight:500, color:T.text1, minWidth:200 }}>
                      {calMonth.toLocaleString('en',{month:'long', year:'numeric'})}
                    </span>
                    <button onClick={() => setCalMonth(nextMonth)}
                      style={{ background:'none', border:`1px solid ${T.border}`, borderRadius:6, width:30, height:30, display:'flex', alignItems:'center', justifyContent:'center', cursor:'pointer', color:T.text1, fontSize:15 }}>›</button>
                  </div>
                  <div style={{ display:'flex', gap:8, alignItems:'center' }}>
                    <button onClick={() => setCalMonth(new Date(today.getFullYear(), today.getMonth(), 1))}
                      style={{ background:'none', border:`1px solid ${T.border}`, borderRadius:20, padding:'5px 14px', fontFamily:T.sans, fontSize:8, fontWeight:600, color:T.text2, cursor:'pointer', letterSpacing:'0.06em' }}>
                      Today
                    </button>
                    {editMode && (
                      <button className="add-btn" onClick={() => openAdd('calband', { label:'', start:'', end:'', color:BAND_COLORS[0] })}
                        style={{ border:`1px dashed ${T.accent}70`, color:T.accent, padding:'5px 12px' }}>
                        + Add Band
                      </button>
                    )}
                  </div>
                </div>

                {/* Legend */}
                {calBands.length > 0 && (
                  <div style={{ display:'flex', flexWrap:'wrap', gap:10, marginBottom:18 }}>
                    {calBands.map(b => (
                      <div key={b.id} style={{ display:'flex', alignItems:'center', gap:6 }}>
                        <div style={{ width:10, height:10, borderRadius:'50%', background:b.color }} />
                        <span style={{ fontFamily:T.sans, fontSize:9, color:T.text2 }}>{b.label}</span>
                      </div>
                    ))}
                  </div>
                )}

                {/* Grid */}
                <div style={{ border:`1px solid ${T.border}`, borderRadius:6, overflow:'hidden' }}>
                  {/* DOW header */}
                  <div style={{ display:'grid', gridTemplateColumns:'repeat(7,1fr)', background:T.bgAlt, borderBottom:`1px solid ${T.border}` }}>
                    {DOW.map(d => (
                      <div key={d} style={{ padding:'9px 12px', fontFamily:T.sans, fontSize:8, fontWeight:700, letterSpacing:'0.14em', textTransform:'uppercase', color:T.text3 }}>{d}</div>
                    ))}
                  </div>

                  {/* Weeks */}
                  {weeks.map((week, wi) => {
                    const weekStart = toDate(week.find(d=>d));
                    const weekEnd   = toDate([...week].reverse().find(d=>d));
                    const activeBands = calBands.filter(b => b.start && b.end && b.label && weekStart && weekEnd && b.start <= weekEnd && b.end >= weekStart);
                    return (
                      <div key={wi} style={{ borderBottom: wi < weeks.length-1 ? `1px solid ${T.border}` : 'none' }}>
                        {/* Day cells */}
                        <div style={{ display:'grid', gridTemplateColumns:'repeat(7,1fr)' }}>
                          {week.map((day, di) => {
                            const ds      = toDate(day);
                            const dayMtgs = ds ? (mtgByDay[ds]||[]) : [];
                            const dayPres = ds ? (presByDay[ds]||[]) : [];
                            const isToday = day && today.getFullYear()===year && today.getMonth()===month && today.getDate()===day;
                            return (
                              <div key={di} style={{
                                minHeight:90, padding:'8px 10px',
                                borderRight: di < 6 ? `1px solid ${T.border}` : 'none',
                                background: isToday ? T.accentBg : !day ? T.bgAlt : T.surface,
                                opacity: !day ? 0.5 : 1,
                              }}>
                                {day && (
                                  <>
                                    <div style={isToday ? {
                                      width:22, height:22, borderRadius:'50%', background:T.accent,
                                      display:'flex', alignItems:'center', justifyContent:'center',
                                      fontFamily:T.sans, fontSize:10, fontWeight:700, color:'#fff', marginBottom:6,
                                    } : {
                                      fontFamily:T.sans, fontSize:11, fontWeight:500, color:T.text3, marginBottom:4,
                                    }}>{day}</div>
                                    {dayPres.map(p => (
                                      <div key={p.id} style={{
                                        background: p.status==='Done' ? T.bgAlt : T.accentBg,
                                        color: p.status==='Done' ? T.text3 : T.accent,
                                        border: `1px solid ${T.accent}44`,
                                        borderRadius:3, padding:'3px 6px', marginBottom:3,
                                        fontFamily:T.sans, fontSize:8, fontWeight:700, lineHeight:1.3, letterSpacing:'0.04em',
                                      }}>★ {p.title}</div>
                                    ))}
                                    {dayMtgs.map(m => (
                                      <div key={m.id} onClick={() => setActiveMeeting(m)} style={{
                                        background: m.status==='Done' ? T.bgAlt : T.accent,
                                        color:      m.status==='Done' ? T.text3 : '#fff',
                                        opacity:    m.status==='Done' ? 0.55 : 1,
                                        border:     m.status==='Done' ? `1px solid ${T.border}` : 'none',
                                        borderRadius:3, padding:'3px 6px', marginBottom:3,
                                        fontFamily:T.sans, fontSize:8, fontWeight:600, lineHeight:1.3, cursor:'pointer',
                                      }}>{m.title}</div>
                                    ))}
                                  </>
                                )}
                              </div>
                            );
                          })}
                        </div>

                        {/* Band rows */}
                        {activeBands.map(b => {
                          let startCol = 7, endCol = -1;
                          week.forEach((day, di) => {
                            const ds = toDate(day);
                            if (ds && ds >= b.start && ds <= b.end) { startCol = Math.min(startCol, di); endCol = Math.max(endCol, di); }
                          });
                          if (endCol < 0) return null;
                          const leftPct  = (startCol / 7 * 100).toFixed(2);
                          const widthPct = ((endCol - startCol + 1) / 7 * 100).toFixed(2);
                          const isFirstWeek = b.start >= weekStart;
                          const isLastWeek  = b.end   <= weekEnd;
                          return (
                            <div key={b.id}
                              onClick={() => editMode && openEdit('calband', b)}
                              style={{ position:'relative', height:30, borderTop:`1px solid ${T.borderHair}`, cursor: editMode ? 'pointer' : 'default' }}>
                              <div style={{
                                position:'absolute', top:4, bottom:4,
                                left:`calc(${leftPct}% + 6px)`,
                                width:`calc(${widthPct}% - 12px)`,
                                background: b.color + '22',
                                border:`1.5px solid ${b.color}66`,
                                borderRadius:`${isFirstWeek?5:0}px ${isLastWeek?5:0}px ${isLastWeek?5:0}px ${isFirstWeek?5:0}px`,
                                display:'flex', alignItems:'center', gap:7, paddingLeft:10, paddingRight:8,
                              }}>
                                <div style={{ width:7, height:7, borderRadius:'50%', background:b.color, flexShrink:0 }} />
                                <span style={{ fontFamily:T.sans, fontSize:9, fontWeight:600, color:b.color, whiteSpace:'nowrap', overflow:'hidden', textOverflow:'ellipsis', flex:1 }}>
                                  {isFirstWeek || startCol === 0 ? b.label : ''}
                                </span>
                                {editMode && <span style={{ fontFamily:T.sans, fontSize:7, color:b.color, opacity:0.6 }}>✏</span>}
                              </div>
                            </div>
                          );
                        })}
                      </div>
                    );
                  })}
                </div>
              </div>
            );
          })()}
        </section>

        {/* ════════════════════════════════
            FILES (id="files")
        ════════════════════════════════ */}
        <section id="files" style={{ paddingTop:48, paddingBottom:48 }}>
          <div style={{ fontFamily:T.sans, fontSize:8, fontWeight:700, letterSpacing:'0.22em', textTransform:'uppercase', color:T.text3, marginBottom:24 }}>Files &amp; Links</div>
          <div style={{ display:'flex', flexDirection:'column', gap:24 }}>
            {links.map(folder => (
              <div key={folder.id}>
                <div style={{ fontFamily:T.sans, fontSize:10, fontWeight:600, color:T.text2, marginBottom:10, display:'flex', alignItems:'center', gap:8 }}>
                  <span>📁</span>
                  <span>{folder.label}</span>
                </div>
                <div style={{ display:'flex', gap:8, flexWrap:'wrap' }}>
                  {folder.subFolders.map(sf => (
                    <div key={sf.id} className="edit-row" style={{ display:'flex', alignItems:'center', gap:4 }}>
                      <a href={sf.url} target="_blank" rel="noopener noreferrer"
                        style={{ display:'flex', alignItems:'center', gap:6, padding:'7px 13px', background:'none', border:`1px solid ${T.border}`, borderRadius:4, textDecoration:'none', transition:'all 0.15s', color:T.text1 }}
                        onMouseEnter={e=>{ e.currentTarget.style.borderColor=T.accent; e.currentTarget.style.background=T.accentBg; e.currentTarget.style.color=T.accent; }}
                        onMouseLeave={e=>{ e.currentTarget.style.borderColor=T.border; e.currentTarget.style.background='none'; e.currentTarget.style.color=T.text1; }}>
                        <span style={{ fontSize:12 }}>{sf.icon}</span>
                        <span style={{ fontFamily:T.sans, fontSize:11, fontWeight:500 }}>{sf.label}</span>
                      </a>
                      {editMode && <EditBadge onClick={() => setEditModal({ type:'link', item:{ ...sf, _folderId: folder.id }, isNew:false })} />}
                    </div>
                  ))}
                </div>
              </div>
            ))}
          </div>
        </section>

      </div>

      {/* ════════════════════════════════
          FOOTER
      ════════════════════════════════ */}
      <div style={{ borderTop:`1px solid ${T.borderHair}`, padding:'20px 24px', textAlign:'center' }}>
        <div style={{ fontFamily:T.sans, fontSize:8, color:T.text3, letterSpacing:'0.12em' }}>
          The Space at 9/2 · Goodricke · Confidential
        </div>
      </div>

      {/* ════════════════════════════════
          MODALS
      ════════════════════════════════ */}
      {showPasscode && (
        <div style={{ position:'fixed', inset:0, zIndex:400, display:'flex', alignItems:'center', justifyContent:'center', background:'rgba(26,25,23,0.55)', backdropFilter:'blur(8px)', WebkitBackdropFilter:'blur(8px)' }}
          onClick={() => { setShowPasscode(false); setPasscodeVal(''); setPasscodeErr(false); }}>
          <div style={{ background:T.surface, borderRadius:10, padding:'36px 40px', width:320, boxShadow:'0 24px 64px rgba(0,0,0,0.22)', border:`1px solid ${T.border}` }}
            onClick={e => e.stopPropagation()}>
            <div style={{ fontFamily:T.serif, fontSize:18, fontWeight:500, color:T.text1, marginBottom:6 }}>Edit Access</div>
            <div style={{ fontFamily:T.sans, fontSize:11, color:T.text3, marginBottom:24 }}>Enter the passcode to enable editing.</div>
            <input
              type="password"
              autoFocus
              value={passcodeVal}
              onChange={e => { setPasscodeVal(e.target.value); setPasscodeErr(false); }}
              onKeyDown={e => e.key === 'Enter' && submitPasscode()}
              placeholder="Passcode"
              style={{ width:'100%', padding:'10px 14px', borderRadius:6, border:`1.5px solid ${passcodeErr ? '#B24B43' : T.border}`, background:T.bg, color:T.text1, fontFamily:T.sans, fontSize:13, outline:'none', marginBottom: passcodeErr ? 6 : 16, boxSizing:'border-box' }}
            />
            {passcodeErr && <div style={{ fontFamily:T.sans, fontSize:10, color:'#B24B43', marginBottom:14 }}>Incorrect passcode. Try again.</div>}
            <div style={{ display:'flex', gap:10 }}>
              <button onClick={() => { setShowPasscode(false); setPasscodeVal(''); setPasscodeErr(false); }}
                style={{ flex:1, padding:'9px 0', borderRadius:6, border:`1px solid ${T.border}`, background:'none', color:T.text2, fontFamily:T.sans, fontSize:11, fontWeight:600, cursor:'pointer' }}>
                Cancel
              </button>
              <button onClick={submitPasscode}
                style={{ flex:1, padding:'9px 0', borderRadius:6, border:'none', background:T.accent, color:'#fff', fontFamily:T.sans, fontSize:11, fontWeight:700, cursor:'pointer', letterSpacing:'0.04em' }}>
                Enter
              </button>
            </div>
          </div>
        </div>
      )}
      {activeMeeting && <MeetingViewModal meeting={activeMeeting} onClose={() => setActiveMeeting(null)} team={team} />}
      {editModal && (
        <EditModal
          modal={editModal}
          phases={phases}
          deliverables={deliverables}
          meetings={meetings}
          presentations={effectivePresentations}
          deps={deps}
          onShiftDates={shiftPhaseDates}
          team={team}
          onClose={() => setEditModal(null)}
          onSave={saveEdit}
          onDelete={deleteEdit}
        />
      )}
    </div>
    </ThemeCtx.Provider>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
